<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fastabqul Khairat — Layanan Ditutup Sementara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --emerald-900:#0B3D31;
    --emerald-700:#125446;
    --emerald-600:#166B58;
    --gold-500:#C79A3A;
    --gold-400:#D9B45C;
    --cream:#FAF6EC;
    --card:#FFFFFF;
    --ink:#1E2B27;
    --muted:#6B7A75;
    --line:#E7E0CE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--cream);
    font-family:'Plus Jakarta Sans', sans-serif;
    color:var(--ink);
    padding:32px 16px;
  }

  .bg-pattern{
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(circle at 50% 50%, transparent 0, transparent 22px, var(--line) 22px, var(--line) 23px, transparent 23px);
    background-size:64px 64px;
    opacity:0.35;
    z-index:0;
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    background:var(--card);
    border-radius:20px;
    border:1px solid var(--line);
    padding:0;
    overflow:hidden;
    box-shadow:0 20px 50px -20px rgba(11,61,49,0.25);
  }

  .card-top{
    padding:34px 32px 26px;
    position:relative;
    line-height:0;
    background:#FFFFFF;
    border-bottom:1px solid var(--line);
  }

  .card-top img{
    width:100%;
    max-width:280px;
    height:auto;
    display:block;
    margin:0 auto;
  }

  .divider{
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-500), transparent);
    margin:0;
  }

  .card-body{
    padding:32px 32px 30px;
    text-align:center;
  }

  .status-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#FBF1DF;
    color:#8A5F14;
    border:1px solid #EBD6A5;
    padding:7px 16px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    margin-bottom:20px;
  }
  .status-pill svg{width:14px;height:14px;flex-shrink:0;}

  .headline{
    font-size:19px;
    font-weight:700;
    margin:0 0 12px;
    color:var(--emerald-900);
  }

  .desc{
    font-size:14.5px;
    line-height:1.75;
    color:var(--muted);
    margin:0 0 26px;
  }

  .btn{
    display:block;
    width:100%;
    background:var(--emerald-700);
    color:#FFFFFF;
    text-decoration:none;
    font-size:15px;
    font-weight:600;
    padding:14px 20px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    transition:background 0.15s ease;
    font-family:inherit;
  }
  .btn:hover{ background:var(--emerald-600); }

  .thanks{
    margin:20px 0 0;
    font-size:13px;
    color:var(--muted);
  }

  .card-footer{
    border-top:1px solid var(--line);
    padding:16px 32px;
    text-align:center;
  }
  .card-footer p{
    margin:0;
    font-size:12.5px;
    color:var(--muted);
  }
  .card-footer a{
    color:var(--emerald-700);
    font-weight:600;
    text-decoration:none;
  }

  @media (max-width:420px){
    .card-top{padding:32px 24px 26px;}
    .card-body{padding:28px 24px 26px;}
    .card-footer{padding:14px 24px;}
  }
</style>
</head>
